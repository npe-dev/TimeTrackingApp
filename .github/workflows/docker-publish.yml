name: Deploy App on production

on:
  push:
    branches: [ "master" ]

env:
  IMAGE: ghcr.io/npe-dev/timetrackingapp

jobs:
  # ---------------------------------------------------------------------------
  # 1) Build the image ON GitHub's runners (not the VPS) and push it to GHCR.
  #    This is what removes build pressure from production: the VPS never runs
  #    composer/npm again — it only pulls a finished image.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # Tag both :latest (for manual use) and the commit SHA (immutable,
          # used by the deploy job so a rollback is just re-pinning IMAGE_TAG).
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Layer cache in the GitHub Actions cache -> fast incremental builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 2) Deploy on the VPS: pull the prebuilt image and recreate containers.
  #    No `down` up front -> the old container keeps serving while the new
  #    image downloads; the swap is a few-second recreate, and `--wait` blocks
  #    until the new app container reports healthy (/up).
  # ---------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        env:
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ vars.APP_URL }}
          SESSION_DOMAIN: ${{ vars.SESSION_DOMAIN }}
          SANCTUM_STATEFUL_DOMAINS: ${{ vars.SANCTUM_STATEFUL_DOMAINS }}
          MAILER_KEY: ${{ secrets.MAILER_KEY }}
          MAIL_FROM_ADDRESS: ${{ vars.MAIL_FROM_ADDRESS }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG,REGISTRY_USER,REGISTRY_TOKEN,APP_KEY,APP_URL,SESSION_DOMAIN,SANCTUM_STATEFUL_DOMAINS,MAILER_KEY,MAIL_FROM_ADDRESS
          script: |
            set -e

            export IMAGE=ghcr.io/npe-dev/timetrackingapp

            # Diagnostic: confirm the secret actually arrived on the VPS without
            # leaking it. Prints only the length + a masked head, so a mismatch
            # (0 = secret empty/not passed) is visible in the deploy log.
            echo "→ APP_KEY sanity: length=${#APP_KEY}, head=$(printf '%s' "$APP_KEY" | cut -c1-7)…"

            echo "→ Navigating to app directory"
            cd /srv/Projects/TimeTrackingApp

            echo "→ Fixing ownership so git can update tracked files"
            # `git reset --hard` must be able to unlink and rewrite every tracked
            # file — which requires the deploy user to OWN the containing dirs.
            # storage/ and database/ hold tracked files (the .gitignore markers and
            # all migrations/seeders/factories) but are chowned to www-data by the
            # container entrypoint, so a previous attempt to prune them from this
            # chown left git unable to unlink them → the reset aborted.
            #
            # Chown the whole checkout back to the deploy user. The container's
            # entrypoint re-chowns storage/ + the SQLite file to www-data on boot,
            # so this ownership only needs to survive until `git reset` below.
            sudo chown -R "$USER:$USER" .

            echo "→ Pulling latest code (compose file, .env template)"
            git fetch --all
            git reset --hard origin/master

            echo "→ Creating .env file from template"
            cp .env.example .env

            echo "→ Populating .env with production values"
            sed -i "s|APP_ENV=local|APP_ENV=production|g" .env
            sed -i "s|APP_DEBUG=true|APP_DEBUG=false|g" .env
            sed -i "s|APP_KEY=|APP_KEY=${APP_KEY}|g" .env
            sed -i "s|APP_URL=http://localhost:8077|APP_URL=${APP_URL}|g" .env
            sed -i "s|LOG_LEVEL=debug|LOG_LEVEL=error|g" .env
            sed -i "s|SESSION_DOMAIN=null|SESSION_DOMAIN=${SESSION_DOMAIN}|g" .env
            sed -i "s|SANCTUM_STATEFUL_DOMAINS=|SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS}|g" .env

            echo "→ Configuring MailerSend transport for the email report"
            sed -i "s|MAIL_MAILER=log|MAIL_MAILER=mailersend|g" .env
            sed -i "s|MAILERSEND_API_KEY=|MAILERSEND_API_KEY=${MAILER_KEY}|g" .env
            # Optional: override the From address (must be a MailerSend-verified domain).
            if [ -n "${MAIL_FROM_ADDRESS}" ]; then
              sed -i "s|MAIL_FROM_ADDRESS=.*|MAIL_FROM_ADDRESS=\"${MAIL_FROM_ADDRESS}\"|g" .env
            fi

            echo "→ Verifying the app key was set"
            # An empty APP_KEY ships a site that 500s on every request ("No
            # application encryption key has been specified"), so fail loudly here.
            grep -q '^APP_KEY=base64:.\+' .env || { echo "❌ ERROR: APP_KEY is empty or malformed (check the 'APP_KEY' secret — must be a 'base64:...' value from 'php artisan key:generate --show')"; exit 1; }

            echo "→ Verifying the MailerSend key was set"
            grep -q '^MAILERSEND_API_KEY=.\+' .env || { echo "❌ ERROR: MAILERSEND_API_KEY is empty (check the 'MAILER_KEY' secret)"; exit 1; }

            echo "→ Verifying .env was created"
            if [ ! -f .env ]; then
              echo "❌ ERROR: .env file was not created"
              exit 1
            fi

            echo "→ Logging in to GHCR"
            echo "${REGISTRY_TOKEN}" | docker login ghcr.io -u "${REGISTRY_USER}" --password-stdin

            echo "→ Pulling prebuilt image ${IMAGE}:${IMAGE_TAG}"
            IMAGE_TAG="${IMAGE_TAG}" docker compose -f docker-compose.prod.yaml pull

            echo "→ Recreating containers (old container serves until new one is healthy)"
            IMAGE_TAG="${IMAGE_TAG}" docker compose -f docker-compose.prod.yaml up -d --wait --remove-orphans

            echo "→ Reclaiming storage/database ownership for the app user"
            # The 'Fixing ownership' step above chowns the whole checkout to the
            # deploy user so git reset works — including storage/ and database/,
            # which the app (www-data) must write. The container entrypoint fixes
            # this on boot, but only when the container is actually recreated; a
            # no-op `up` (unchanged image) skips it and leaves storage owned by the
            # deploy user → "laravel.log ... Permission denied". Re-assert it here,
            # unconditionally, every deploy.
            docker exec -i timetracking_app chown -R www-data:www-data \
              /var/www/html/storage /var/www/html/database

            echo "→ Running migrations"
            docker exec -i timetracking_app php artisan migrate --force

            echo "→ Cleaning up old images"
            docker logout ghcr.io
            docker image prune -f

            echo "✅ Deployment complete"
