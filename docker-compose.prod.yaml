services:
  timetracking_app:
    # Prebuilt image pulled from GHCR (built in CI, never built on the VPS).
    # IMAGE_TAG is set by the deploy workflow to the commit SHA for immutable,
    # rollback-able deploys; falls back to :latest for manual `docker compose` use.
    image: ghcr.io/npe-dev/timetrackingapp:${IMAGE_TAG:-latest}
    container_name: timetracking_app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      # Mount only the SQLite data file, not the whole database/ dir. Migrations
      # and seeders ship inside the image; bind-mounting the dir would expose
      # git-tracked files to the container's recursive chown, which then breaks
      # the deploy user's `git reset --hard` with "unable to unlink" errors.
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
      - ./.env:/var/www/html/.env:ro
    networks:
      - nginx_default
    expose:
      - 80
    healthcheck:
      # Laravel's built-in health endpoint (bootstrap/app.php -> health: '/up').
      # Lets `docker compose up -d --wait` block until the new container serves.
      test: ["CMD", "curl", "-fsS", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  timetracking_scheduler:
    # Runs Laravel's scheduler so cron-driven work fires in production:
    # stale-timer cleanup, scheduled automations, and the daily email report.
    # Same image as the app, sharing the SQLite DB + storage volumes.
    image: ghcr.io/npe-dev/timetrackingapp:${IMAGE_TAG:-latest}
    container_name: timetracking_scheduler
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      # Only the SQLite data file — see the app service for why the whole
      # database/ dir is not mounted.
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
      - ./.env:/var/www/html/.env:ro
    networks:
      - nginx_default
    environment:
      # The app container owns permission setup on the shared volumes; skip the
      # redundant recursive chown here (see docker/entrypoint.sh).
      - FIX_PERMISSIONS=false
    command: php artisan schedule:work
    depends_on:
      # Wait until the app is healthy so its permission fix has completed before
      # this container touches the shared storage volume.
      timetracking_app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "schedule:work"]
      interval: 60s
      timeout: 10s
      retries: 3

  timetracking_queue:
    # Processes the database queue (QUEUE_CONNECTION=database) so slow work —
    # notably the per-board report SMTP send — runs here instead of blocking the
    # scheduler or holding the SQLite DB. Same image + shared volumes.
    image: ghcr.io/npe-dev/timetrackingapp:${IMAGE_TAG:-latest}
    container_name: timetracking_queue
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      # Only the SQLite data file — see the app service for why the whole
      # database/ dir is not mounted.
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
      - ./.env:/var/www/html/.env:ro
    networks:
      - nginx_default
    environment:
      # The app container owns permission setup on the shared volumes; skip the
      # redundant recursive chown here (see docker/entrypoint.sh).
      - FIX_PERMISSIONS=false
    command: php artisan queue:work --tries=3 --sleep=3 --max-time=3600
    depends_on:
      # Wait until the app is healthy so its permission fix has completed before
      # this container touches the shared storage volume.
      timetracking_app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "queue:work"]
      interval: 60s
      timeout: 10s
      retries: 3

networks:
  nginx_default:
    external: true
