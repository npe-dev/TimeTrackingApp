services:
  timetracking_app:
    build:
      context: .
      dockerfile: docker/Dockerfile.local
    container_name: timetracking_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - AUTO_MIGRATE=true
    entrypoint: /var/www/html/docker/entrypoint.sh
    command: php-fpm
    networks:
      - timetracking

  timetracking_web:
    image: nginx:alpine
    container_name: timetracking_web
    restart: unless-stopped
    ports:
      - "8077:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - timetracking_app
    networks:
      - timetracking

  timetracking_node:
    image: node:20-alpine
    container_name: timetracking_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "rm -f public/hot && npm install && npm install -g chokidar-cli && npm run build && echo 'Build done. Watching for changes...' && chokidar 'resources/**/*' -c 'npm run build' --silent"
    networks:
      - timetracking

  timetracking_scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.local
    container_name: timetracking_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    # Wait for the app container to install dependencies (shared volume), then
    # run the Laravel scheduler, which fires `timers:stop-stale` every minute.
    command: sh -c "until [ -f vendor/autoload.php ]; do echo 'waiting for dependencies...'; sleep 2; done; php artisan schedule:work"
    depends_on:
      - timetracking_app
    networks:
      - timetracking

  timetracking_queue:
    build:
      context: .
      dockerfile: docker/Dockerfile.local
    container_name: timetracking_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    # Wait for dependencies (shared volume), then process the database queue so
    # queued jobs (e.g. the per-board report email) run outside web requests.
    command: sh -c "until [ -f vendor/autoload.php ]; do echo 'waiting for dependencies...'; sleep 2; done; php artisan queue:work --tries=3 --sleep=3"
    depends_on:
      - timetracking_app
    networks:
      - timetracking

networks:
  timetracking:
    driver: bridge
